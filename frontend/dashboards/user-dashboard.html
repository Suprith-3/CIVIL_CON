<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | BuildHub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f1f5f9; display: flex; min-height: 100vh; font-family: 'Inter', sans-serif; margin:0; }
        .sidebar { width: 260px; background: #0f172a; color: white; display: flex; flex-direction: column; padding: 2rem 1.5rem; position: fixed; height: 100vh; box-sizing: border-box; }
        .sidebar .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 3rem; }
        .nav-menu { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 15px; text-decoration: none; color: #94a3b8; border-radius: 12px; transition: 0.2s; font-weight: 600; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .main-content { margin-left: 260px; flex-grow: 1; padding: 2.5rem 3rem; width: calc(100% - 260px); box-sizing: border-box; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: white; padding: 1rem 2rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2.5rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .stat-card label { color: #64748b; font-size: 0.8rem; font-weight: 700; display: block; margin-bottom: 5px; }
        .stat-card .value { font-size: 1.8rem; font-weight: 800; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .p-card { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.3s; }
        .p-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(8px); }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <a href="../index.html" class="home-btn" title="Go to Home">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
    </a>
    <div class="sidebar">
        <div class="logo">👷 Build<span>Hub</span></div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="showSection('home', this)">🏠 Home</div>
            <div class="nav-item" onclick="showSection('engineers', this)">👷 Engineers</div>
            <div class="nav-item" onclick="showSection('workers', this)">🏗️ Workers</div>
            <div class="nav-item" onclick="showSection('equipment', this)">🛍️ Equipment</div>
            <div class="nav-item" onclick="showSection('schemes', this)">🏛️ Gov Schemes</div>
            <div class="nav-item" onclick="showSection('messages', this)">💬 Messages</div>
        </div>
        <div class="nav-item" style="margin-top:auto; color:#ef4444;" onclick="logout()">🚪 Logout</div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2 id="pageTitle">Welcome to BuildHub</h2>
            <div style="display:flex; align-items:center; gap:15px;">
                <span id="userEmail" style="color:#64748b; font-size:0.9rem;">user@gmail.com</span>
                <div style="width:40px; height:40px; background:#2563eb; color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700;">U</div>
            </div>
        </div>

        <div id="homeStats" class="stats-grid">
            <div class="stat-card"><label>Total Orders</label><div class="value">0</div></div>
            <div class="stat-card"><label>Active Schemes</label><div class="value">12</div></div>
            <div class="stat-card"><label>Inquiries</label><div class="value">0</div></div>
        </div>

        <div class="section-header">
            <h3 id="sectionHeader">Recently Uploaded Projects</h3>
        </div>

        <div class="grid-container" id="mainGrid">
            <!-- Content Loads Dynamically -->
        </div>
    </div>

    <!-- Portfolio Modal -->
    <div id="portfolioModal" class="modal">
        <div style="background:white; padding:2.5rem; border-radius:30px; width:800px; max-height:85vh; overflow-y:auto; position:relative;">
            <span style="position:absolute; top:1.5rem; right:2rem; cursor:pointer; font-size:2rem;" onclick="closePortfolio()">&times;</span>
            <div id="portfolioContent"></div>
        </div>
    </div>

    <!-- Project Detail Modal -->
    <div id="projectDetailModal" class="modal" style="z-index:3000;">
        <div style="background:white; padding:2.5rem; border-radius:30px; width:900px; max-height:85vh; overflow-y:auto; position:relative;">
            <span style="position:absolute; top:1.5rem; right:2rem; cursor:pointer; font-size:2rem;" onclick="closeProjectDetail()">&times;</span>
            <div id="projectDetailContent"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:5000/api';
        const IMG_BASE_URL = 'http://127.0.0.1:5000';

        function showSection(section, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            
            const grid = document.getElementById('mainGrid');
            const header = document.getElementById('sectionHeader');
            const stats = document.getElementById('homeStats');
            
            stats.style.display = (section === 'home') ? 'grid' : 'none';

            if (section === 'engineers') {
                header.textContent = "Verified Engineers";
                loadEngineers();
            } else if (section === 'workers') {
                header.textContent = "Skilled Construction Workers";
                loadWorkers();
            } else if (section === 'schemes') {
                header.textContent = "Government Welfare Schemes";
                loadSchemes();
            } else if (section === 'home') {
                header.textContent = "Recently Uploaded Projects";
                loadRecentProjects();
            } else {
                header.textContent = "Coming Soon";
                grid.innerHTML = '<p>This section is currently under development.</p>';
            }
        }

        async function loadRecentProjects() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '<p>Discovering new builds...</p>';
            try {
                const res = await fetch(`${API_BASE_URL}/engineer/all-projects`);
                const data = await res.json();
                grid.innerHTML = '';
                if (data.projects && data.projects.length > 0) {
                    data.projects.forEach(p => {
                        const img = p.images && p.images.length > 0 ? `${IMG_BASE_URL}${p.images[0]}` : '';
                        const pJson = encodeURIComponent(JSON.stringify(p));
                        grid.innerHTML += `
                            <div class="p-card" onclick="openProjectDetail('${pJson}')" style="cursor:pointer;">
                                <div style="height:180px; background-image:url('${img}'); background-size:cover; background-position:center; background-color:#f1f5f9;"></div>
                                <div style="padding:1.5rem;">
                                    <h3 style="margin:0;">${p.title}</h3>
                                    <p style="color:#64748b; font-size:0.85rem; margin-top:5px;">📍 ${p.location} • ₹${p.cost}L</p>
                                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                                        <span style="color:#2563eb; font-weight:700; font-size:0.85rem;">View Gallery →</span>
                                        <button onclick="event.stopPropagation(); viewPortfolio('${p.engineer_id}')" style="padding:4px 8px; background:#f1f5f9; border:none; border-radius:5px; color:#64748b; font-size:0.7rem; cursor:pointer;">Profile</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                } else { grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">No projects found.</p>'; }
            } catch (e) { grid.innerHTML = '<p>Error loading projects.</p>'; }
        }

        async function loadEngineers() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '<p>Loading verified engineers...</p>';
            try {
                const res = await fetch(`${API_BASE_URL}/admin/approved-engineers`);
                const engineers = await res.json();
                grid.innerHTML = '';
                engineers.forEach(eng => {
                    grid.innerHTML += `
                        <div class="p-card">
                            <div style="height:140px; background:#f1f5f9; display:flex; align-items:center; justify-content:center; font-size:3rem;">👷</div>
                            <div style="padding:1.5rem;">
                                <h4 style="margin:0;">${eng.full_name || 'Engineer'}</h4>
                                <p style="color:#64748b; font-size:0.8rem; margin:10px 0;">Verified Professional</p>
                                <button onclick="viewPortfolio('${eng.id}')" style="width:100%; padding:10px; background:#2563eb; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:700;">View Portfolio</button>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { grid.innerHTML = '<p>Error loading engineers.</p>'; }
        }

        async function loadWorkers() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '<p>Discovering skilled hands...</p>';
            try {
                const res = await fetch(`${API_BASE_URL}/worker/all-portfolio`);
                const data = await res.json();
                grid.innerHTML = '';
                
                if (data.portfolio && data.portfolio.length > 0) {
                    data.portfolio.forEach(w => {
                        const img = w.image_url ? `${IMG_BASE_URL}${w.image_url}` : '';
                        grid.innerHTML += `
                            <div class="p-card">
                                <div style="height:160px; background-image:url('${img}'); background-size:cover; background-position:center; background-color:#f0f9ff;"></div>
                                <div style="padding:1.5rem;">
                                    <h3 style="margin:0; font-size:1.1rem;">${w.title}</h3>
                                    <p style="color:#64748b; font-size:0.85rem; margin-top:8px; height:40px; overflow:hidden;">${w.description}</p>
                                    <div style="background:#f8fafc; padding:10px; border-radius:12px; margin:15px 0; display:flex; justify-content:space-between; align-items:center;">
                                        <div>
                                            <label style="display:block; font-size:0.7rem; color:#94a3b8; font-weight:700;">COST</label>
                                            <span style="color:#10b981; font-weight:800;">₹${w.cost}</span>
                                        </div>
                                        <div style="text-align:right;">
                                            <label style="display:block; font-size:0.7rem; color:#94a3b8; font-weight:700;">DURATION</label>
                                            <span style="color:#0f172a; font-weight:800;">${w.duration_days} Days</span>
                                        </div>
                                    </div>
                                    <button onclick="alert('Inquiry sent to worker!')" style="width:100%; padding:12px; background:#0f172a; color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer; transition:0.2s;">Hire for this Job</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = '<p style="grid-column:1/-1; text-align:center;">No worker services listed yet.</p>';
                }
            } catch (e) { grid.innerHTML = '<p>Error loading worker services.</p>'; }
        }

        async function loadSchemes() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '<div style="grid-column:1/-1;"><button class="btn-primary" onclick="searchAISchemes()" style="margin-bottom:2rem; width:100%;">🔍 Live AI Gov Scheme Search</button><div id="sch_area"></div></div>';
            try {
                const res = await fetch(`${API_BASE_URL}/admin/schemes`);
                const data = await res.json();
                const area = document.getElementById('sch_area');
                area.innerHTML = '<h4>Official Verified Schemes</h4>';
                data.schemes.forEach(s => {
                    area.innerHTML += `<div class="p-card" style="margin-bottom:1rem; padding:1.5rem;"><h3 style="color:#2563eb;">${s.title}</h3><p>${s.description}</p><a href="${s.official_link}" target="_blank">Official Details →</a></div>`;
                });
            } catch (e) {}
        }

        async function searchAISchemes() {
            const area = document.getElementById('sch_area');
            area.innerHTML = '<p>🤖 AI is searching live Indian portals...</p>';
            try {
                const res = await fetch(`${API_BASE_URL}/ai/search-schemes`);
                const data = await res.json();
                area.innerHTML = `<div style="background:#0f172a; color:white; padding:2rem; border-radius:20px; white-space:pre-wrap;">${data.schemes}</div>`;
            } catch (e) { alert('AI Error'); }
        }

        async function viewPortfolio(id) {
            closeProjectDetail();
            const modal = document.getElementById('portfolioModal');
            const content = document.getElementById('portfolioContent');
            modal.style.display = 'flex';
            content.innerHTML = '<p>Loading portfolio...</p>';
            try {
                const res = await fetch(`${API_BASE_URL}/engineer/portfolio?engineer_id=${id}`);
                const data = await res.json();
                if (data.projects && data.projects.length > 0) {
                    content.innerHTML = '<h2>Work Portfolio</h2><p style="color:#64748b; margin-bottom:1.5rem;">Click any project below for details & gallery.</p><div id="portGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;"></div>';
                    const grid = document.getElementById('portGrid');
                    data.projects.forEach(p => {
                        const img = p.images && p.images.length > 0 ? `${IMG_BASE_URL}${p.images[0]}` : '';
                        const pJson = encodeURIComponent(JSON.stringify(p));
                        grid.innerHTML += `
                            <div onclick="openProjectDetail('${pJson}')" style="border:1px solid #e2e8f0; border-radius:20px; overflow:hidden; cursor:pointer; background:white;">
                                <div style="height:150px; background-image:url('${img}'); background-size:cover; background-position:center;"></div>
                                <div style="padding:1rem;">
                                    <h4 style="margin:0;">${p.title}</h4>
                                    <p style="color:#2563eb; font-size:0.8rem; font-weight:700;">📍 ${p.location}</p>
                                </div>
                            </div>
                        `;
                    });
                } else { content.innerHTML = "<h2>No projects found.</h2>"; }
            } catch (e) { content.innerHTML = "<p>Error.</p>"; }
        }

        function openProjectDetail(pJson) {
            const p = JSON.parse(decodeURIComponent(pJson));
            const modal = document.getElementById('projectDetailModal');
            const content = document.getElementById('projectDetailContent');
            modal.style.display = 'flex';
            let imgsHtml = '';
            (p.images || []).forEach(i => imgsHtml += `<img src="${IMG_BASE_URL}${i}" style="width:100%; border-radius:15px; margin-bottom:1rem; box-shadow:0 4px 10px rgba(0,0,0,0.1);">`);
            
            content.innerHTML = `
                <h2>${p.title}</h2>
                <p style="color:#2563eb; font-weight:700; margin-bottom:1.5rem;">📍 ${p.location} • ₹${p.cost}L</p>
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:2rem;">
                    <div><h4>Photo Gallery</h4>${imgsHtml}</div>
                    <div>
                        <div style="background:#f8fafc; padding:1.5rem; border-radius:20px; position:sticky; top:0;">
                            <h4>Project Sketch</h4>
                            <img src="${IMG_BASE_URL}${p.sketch_url}" style="width:100%; border-radius:10px; border:1px solid #eee; margin-bottom:1rem;">
                            <h4>Description</h4>
                            <p style="color:#64748b; font-size:0.9rem;">${p.description || 'Completed project'}</p>
                            <button class="btn-primary" style="width:100%; margin-top:1.5rem;" onclick="event.stopPropagation(); viewPortfolio('${p.engineer_id}')">Visit Engineer Profile</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function closePortfolio() { document.getElementById('portfolioModal').style.display = 'none'; }
        function closeProjectDetail() { document.getElementById('projectDetailModal').style.display = 'none'; }
        function logout() { localStorage.clear(); window.location.href = '../index.html'; }
        window.onload = () => { showSection('home'); };
    </script>
</body>
</html>
