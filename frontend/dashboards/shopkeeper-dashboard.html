<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopkeeper Dashboard | Civil Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { display: flex; background: #f8fafc; }
        .sidebar { width: 260px; height: 100vh; background: #1e293b; color: white; position: fixed; padding: 2rem 1rem; }
        .main { margin-left: 260px; flex: 1; padding: 2rem; }
        .nav-link { padding: 0.75rem 1rem; display: block; color: #94a3b8; text-decoration: none; border-radius: 8px; margin-bottom: 0.5rem; cursor: pointer; }
        .nav-link.active { background: #334155; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 2rem; border-radius: 12px; width: 500px; max-width: 90%; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .status-approved { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <a href="../index.html" class="home-btn" title="Go to Home">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
    </a>
    <div class="sidebar">
        <h2 style="margin-bottom: 2rem; padding: 0 1rem;">Shop Central</h2>
        <div class="nav-link active" onclick="showTab('inventory')">📦 Inventory</div>
        <div class="nav-link" onclick="showTab('orders')">📋 Orders</div>
        <div class="nav-link" onclick="showTab('profile')">🏪 Shop Profile</div>
        <div class="nav-link" style="margin-top: 2rem; color: #ef4444;" onclick="logout()">🚪 Logout</div>
    </div>

    <div class="main">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1 id="shopName">My Shop</h1>
                <span id="shopStatus" class="status-pill status-pending">Status: Pending Approval</span>
            </div>
            <div style="display:flex; align-items:center; gap:1rem;">
                <div id="google_translate_element"></div>
                <button class="btn btn-primary" id="addBtn" onclick="toggleModal(true)">+ Add Product</button>
            </div>
            <script type="text/javascript">
                function googleTranslateElementInit() {
                    new google.translate.TranslateElement({
                        pageLanguage: 'en',
                        includedLanguages: 'hi,bn,te,mr,ta,gu,kn,ml,pa,ur,as,or,sa,en',
                        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
                    }, 'google_translate_element');
                }
            </script>
            <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
        </header>

        <div id="inventoryTab" class="tab-content">
            <div class="card">
                <h3>Product Listings</h3>
                <div id="productList" style="margin-top: 1.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem;">
                    <!-- Products will be listed here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div class="modal" id="addModal">
        <div class="modal-content card">
            <h3>Add New Product</h3>
            <form id="productForm" style="margin-top: 1rem;">
                <div style="margin-bottom: 1rem;">
                    <label>Product Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Price (₹)</label>
                    <input type="number" name="price" class="form-control" required>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Category</label>
                    <select name="category" class="form-control">
                        <option>Cement</option>
                        <option>Steel</option>
                        <option>Tools</option>
                        <option>Machinery</option>
                        <option>Bricks</option>
                    </select>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label>Type</label>
                    <select name="item_type" class="form-control">
                        <option value="buy">For Sale</option>
                        <option value="rent">For Rent</option>
                    </select>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button type="button" class="btn" style="flex: 1; border: 1px solid #ddd;" onclick="toggleModal(false)">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex: 1;">List Item</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initShopDashboard } from '../js/dashboards/shopkeeper.js';
        
        window.toggleModal = (show) => {
            document.getElementById('addModal').style.display = show ? 'flex' : 'none';
        }

        window.logout = () => {
            localStorage.clear();
            window.location.href = '../index.html';
        }

        initShopDashboard();
    </script>
</body>
</html>
