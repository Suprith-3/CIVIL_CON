<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth | CIVIL CONNECTION</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/theme.js"></script>
    
    <!-- Speed: DNS Prefetch & Preconnect for Backend -->
    <link rel="dns-prefetch" href="https://civil-con.onrender.com">
    <link rel="preconnect" href="https://civil-con.onrender.com" crossorigin>
    
    <!-- Speed: Prefetch common dashboards to speed up redirect -->
    <link rel="prefetch" href="../dashboards/user-dashboard.html">
    <link rel="prefetch" href="../dashboards/worker-dashboard.html">
    <link rel="prefetch" href="../dashboards/shopkeeper-dashboard.html">
    <link rel="prefetch" href="../dashboards/engineer-dashboard.html">
    <style>
        .auth-page {
            background: var(--bg-light) !important;
            transition: all 0.3s ease;
        }
        .auth-container {
            background: white;
            border: 1px solid var(--border);
            box-shadow: var(--card-shadow) !important;
            transition: all 0.3s ease;
            max-width: 1100px;
        }
        .auth-sidebar {
            background: var(--primary) !important;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        /* Dashboard Sidebar style accent for Dark Mode */
        [data-theme='dark'] .auth-sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }
        .role-btn.active {
            border-color: var(--primary) !important;
            background: #eff6ff !important;
            color: var(--primary) !important;
        }
        .auth-tab.active {
            color: var(--primary) !important;
            border-bottom: 2px solid var(--primary) !important;
        }
        .btn-auth {
            background: var(--primary) !important;
        }
        /* Mobile fixes */
        @media (max-width: 768px) {
            .auth-container { flex-direction: column !important; min-height: auto; width: 100%; border-radius: 0; }
            .auth-sidebar { padding: 3rem 2rem; border-radius: 0 !important; flex: none; }
            .auth-content { padding: 2.5rem 1.5rem; }
            .role-selectors { margin-bottom: 2rem; display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 10px !important; }
        }
    </style>
</head>
<body class="auth-page" data-theme="light">
    <!-- Theme Toggle -->
    <div class="theme-toggle" title="Toggle Dark/Light Mode">
        <i class="fa-solid fa-moon"></i>
        <i class="fa-solid fa-sun"></i>
    </div>
    
    <a href="../index.html" class="home-btn" title="Go to Home" style="color: #64748b; background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
        </svg>
    </a>
    <div class="auth-container animate-fade-in">
        <!-- Sidebar -->
        <div class="auth-sidebar">
            <div id="google_translate_element" style="margin-bottom: 2rem;"></div>
            <script type="text/javascript">
                function googleTranslateElementInit() {
                    new google.translate.TranslateElement({
                        pageLanguage: 'en',
                        includedLanguages: 'hi,bn,te,mr,ta,gu,kn,ml,pa,ur,as,or,sa,en',
                        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
                    }, 'google_translate_element');
                }
            </script>
            <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
            <div class="logo" style="display: flex; align-items: center; gap: 15px; margin-bottom: 2.5rem;">
                <img src="../img/logo.jpg" alt="CIVIL CONNECTION" style="height: 70px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
                <div style="display: flex; flex-direction: column; line-height: 1;">
                    <span style="font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: -1px;">CIVIL</span>
                    <span style="font-size: 1.1rem; font-weight: 800; color: #00f2fe; letter-spacing: 1px;">CONNECTION</span>
                </div>
            </div>
            <h1>The Foundation <br> for Your Projects</h1>
            <p>Connect with skilled workers, hire engineers, and buy construction materials all in one place.</p>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <span>10K+</span>
                    <small>Workers</small>
                </div>
                <div class="stat-box">
                    <span>5K+</span>
                    <small>Engineers</small>
                </div>
                <div class="stat-box">
                    <span>1K+</span>
                    <small>Shops</small>
                </div>
                <div class="stat-box">
                    <span>50K+</span>
                    <small>Projects</small>
                </div>
            </div>
        </div>

        <!-- Auth Content -->
        <div class="auth-content">
            <div class="role-selectors">
                <div class="role-btn" data-role="user">
                    <i class="fa-solid fa-user-tie"></i>
                    <small>Customer</small>
                </div>
                <div class="role-btn" data-role="engineer">
                    <i class="fa-solid fa-compass-drafting"></i>
                    <small>Engineer</small>
                </div>
                <div class="role-btn" data-role="worker">
                    <i class="fa-solid fa-helmet-safety"></i>
                    <small>Worker</small>
                </div>
                <div class="role-btn" data-role="shopkeeper">
                    <i class="fa-solid fa-store"></i>
                    <small>Shopkeeper</small>
                </div>
                <div class="role-btn" data-role="renter">
                    <i class="fa-solid fa-truck-pickup"></i>
                    <small>Rent</small>
                </div>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login">Login</div>
                <div class="auth-tab" id="tab-register">Register</div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="user@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; font-size: 0.85rem;">
                    <label style="display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--secondary); text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-auth" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <div id="spinner" class="loading-spinner" style="width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: none;"></div>
                    <span id="btnText">Sign In</span>
                </button>
                <div id="errorBox" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; text-align: center; display: none;"></div>
            </form>

            <style>
                @keyframes spin {
                    to { transform: rotate(360deg); }
                }
                
                @media (max-width: 768px) {
                    .auth-container { flex-direction: column; min-height: auto; width: 100%; border-radius: 0; }
                    .auth-sidebar { padding: 3rem 2rem; border-radius: 0 0 30px 30px; }
                    .auth-content { padding: 2.5rem 1.5rem; }
                    .role-selectors { margin-bottom: 2rem; grid-template-columns: repeat(3, 1fr) !important; gap: 10px !important; }
                }
            </style>
        </div>
    </div>

    <script type="module">
        import { initLogin } from '../js/auth.js';
        
        const params = new URLSearchParams(window.location.search);
        let currentRole = params.get('role') || 'user';
        let currentTab = params.get('tab') || 'login';

        const roleBtns = document.querySelectorAll('.role-btn');
        const loginForm = document.getElementById('loginForm');

        // Initial setup
        const updateUI = () => {
            roleBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.role === currentRole);
            });
            
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.classList.toggle('active', 
                    (tab.id === 'tab-login' && currentTab === 'login') || 
                    (tab.id === 'tab-register' && currentTab === 'register'));
            });

            if (currentTab === 'register') {
                window.location.href = `register-${currentRole}.html`;
            }
        };

        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentRole = btn.dataset.role;
                updateUI();
                initLogin(currentRole);
            });
        });

        document.getElementById('tab-register').addEventListener('click', () => {
            currentTab = 'register';
            updateUI();
        });

        // Initialize
        updateUI();
        if (currentRole === 'admin') {
            document.querySelector('.role-selectors').style.display = 'none';
        }
        initLogin(currentRole);
    </script>
</body>
</html>
