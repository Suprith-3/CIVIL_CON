<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration | Civil Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .register-container {
            max-width: 550px;
            margin: 4rem auto;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group.full {
            grid-column: span 2;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
            display: none;
            margin-bottom: 1rem;
        }
        #getLocation {
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
        }
        #getLocation:hover {
            background: #f8fafc;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-1px);
        }
        #getLocation:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card register-container animate-fade-in">
            <h2 style="margin-bottom: 0.5rem;">Join Civil Hub</h2>
            <p style="color: #64748b; margin-bottom: 2rem;">Create your customer account to start hiring and shopping.</p>

            <form id="registerForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="form-control" placeholder="+91 ..." required>
                    </div>
                    <div class="form-group full">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="form-group full">
                        <label for="address">Address</label>
                        <textarea id="address" name="address" class="form-control" rows="3" placeholder="Enter your full delivery address"></textarea>
                        <button type="button" id="getLocation" class="btn-secondary" style="margin-top: 10px; font-size: 0.85rem; padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px;">
                            📍 Use Live Location
                        </button>
                        <div id="locationStatus" style="font-size: 0.8rem; margin-top: 5px; color: #10b981; display: none;"></div>
                        <input type="hidden" id="latitude" name="lat">
                        <input type="hidden" id="longitude" name="lng">
                    </div>

                    <script>
                        document.getElementById('getLocation').addEventListener('click', function() {
                            const btn = this;
                            const status = document.getElementById('locationStatus');
                            const addressField = document.getElementById('address');
                            const latField = document.getElementById('latitude');
                            const lngField = document.getElementById('longitude');

                            if (!navigator.geolocation) {
                                alert("Geolocation is not supported by your browser");
                                return;
                            }

                            btn.disabled = true;
                            btn.textContent = "📍 Locating...";
                            status.style.display = 'none';

                            navigator.geolocation.getCurrentPosition(
                                async (position) => {
                                    const lat = position.coords.latitude;
                                    const lng = position.coords.longitude;
                                    
                                    latField.value = lat;
                                    lngField.value = lng;
                                    
                                    btn.textContent = "📍 Location Fixed";
                                    btn.style.borderColor = "#10b981";
                                    btn.style.color = "#10b981";
                                    status.textContent = `Coordinates captured: ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                                    status.style.display = 'block';

                                    // Optional: Reverse Geoding using Nominatim (OpenStreetMap) - Free
                                    try {
                                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                                        const data = await response.json();
                                        if (data.display_name) {
                                            addressField.value = data.display_name;
                                        }
                                    } catch (err) {
                                        console.error("Reverse geocoding failed", err);
                                    }
                                },
                                (error) => {
                                    btn.disabled = false;
                                    btn.textContent = "📍 Use Live Location";
                                    alert("Unable to retrieve your location. Please type manually.");
                                },
                                { enableHighAccuracy: true }
                            );
                        });
                    </script>
                </div>

                <div id="errorBox" style="display: none; background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; font-weight: 500; border: 1px solid #fecaca; text-align: center;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    <span id="spinner" style="display: none; width: 15px; height: 15px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px;"></span>
                    <span id="btnText">Create Account</span>
                </button>

                <p style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: #64748b;">
                    Already have an account? <a href="login.html?role=user" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
                </p>
            </form>
        </div>
    </div>

    <script type="module">
        import { initRegister } from '../js/auth.js';
        initRegister('user');
    </script>
</body>
</html>
